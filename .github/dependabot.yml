version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
    cooldown:
      default-days: 5
      semver-major-days: 7
      semver-minor-days: 5
      semver-patch-days: 3

  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
